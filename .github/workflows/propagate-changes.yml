name: Propagate Configuration Changes

on:
  push:
    branches: [main]
    paths: ['templates/**']
  workflow_dispatch:
    inputs:
      target_repos:
        description: 'Comma-separated list of repos (or "all")'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  propagate:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Get list of target repositories
        id: repos
        run: |
          # Query GitHub API for repositories with .repo-config.toml
          # Or use input parameter

      - name: Update configurations
        run: |
          config-manager propagate \
            --repos="${{ steps.repos.outputs.repo_list }}" \
            --token="${{ secrets.CONFIG_SYNC_TOKEN }}"
