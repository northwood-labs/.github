# config-sets.toml
# Configuration sets and sections available for config-manager.

[standard]
  version = "1.0"
  description = "Standard configuration definitions for config-manager"

# Configuration Sets - Collections of related stub files
[sets.golang]
  description = "Go language support with build targets, testing, and linting."

  [[sets.golang.files]]

    # aws-developer
    #   aws agent toolkit
    #   local
    # aws-user
    #   awscli
    #   aws-sso-manager
    #   aws-vault
    # bats
    # containers
    #   apple-containers
    #   docker-desktop
    #   krunvm
    #   podman
    #   tilt-dev/tap/tilt
    # database
    #   atlas
    #   tbls
    #   Datagrip
    #   pg_*
    # deep-security
    # frontend
    #   Bun
    #   Deno
    #   TypeScript
    #   Vite
    # github
    #   gh
    # golang
    #   golang-cli
    #   golang-library (testing, fuzzing)
    # graphql
    #   Ent
    #   Khan/genqlient
    # hugo
    # jsonnet
    # ops
    #   k8s
    # protobuf
    #   buf
    # python
    #   ruff
    #   uv
    #   zuban
    # rest
    #   OpenAPI tooling
    # rust
    # standard
    #   llm
    # terraform (terraform-mcp-server)
    #   tfprovider (provider tooling)
    #   tfmodule
    # wasm
    # xml

[[files]]
  stub = 'configs/stubs/.vscode/settings-containers.toml'
  source = 'configs/templates/.vscode/settings-containers.toml'
  destination = '.vscode/settings-containers.toml'

[[files]]
  stub = 'configs/stubs/.vscode/settings-frontend.toml'
