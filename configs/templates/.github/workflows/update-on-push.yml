---
# This workflow uses actions that are not certified by GitHub. They are provided
# by a third-party and are governed by separate terms of service, privacy
# policy, and support documentation.

# @config-manager:start workflow-name
name: Generate CHANGELOG on push
# @config-manager:end workflow-name

on:
  # @config-manager:start workflow-on
  workflow_dispatch:
  push:
    branches:
      - main
  # @config-manager:end workflow-on

concurrency:
  # @config-manager:start workflow-concurrency
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  # @config-manager:end workflow-concurrency

# Declare default permissions as read only.
# @config-manager:start workflow-permissions
permissions: read-all
# @config-manager:end workflow-permissions

jobs:
  update_on_push_job:
    # @config-manager:start update-on-push-job
    runs-on: ubuntu-latest
    name: Generate CHANGELOG on push
    timeout-minutes: 2
    permissions:
      contents: write
    # @config-manager:end update-on-push-job
    steps:
      # @config-manager:start harden-runner
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          # @config-manager:end harden-runner
          allowed-endpoints: >
            # This is filled-in by configs/templates/.github/workflows/__harden-hosts.yml

      # @config-manager:start workflow-run-steps
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Generate Changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Remove git-cliff artifacts
        run: |
          rm -Rf git-cliff*

      - name: Generate artifacts
        run: |
          # Generate list of authors
          ./scripts/generate-contributors.sh

      - name: Git commit if changed
        run: |
          git config user.name "Northwood Labs (Bot)"
          git config user.email "bot@northwood-labs.com"

          set +e

          git add .
          git status | grep modified
          if [ $? -eq 0 ]; then
            git commit -a -m "automation: Updated AUTHORS and CHANGELOG on $(date)."
            git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git main
          fi
      # @config-manager:end workflow-run-steps
